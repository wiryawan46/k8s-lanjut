apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: manggala.wiryawan@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.mycompany.domain # Biarkan default sesuai webhook bawaan manifest
          solverName: godaddy
          config:
            apiKeySecretRef:
              name: godaddy-api-credentials
              key: api-key
            apiSecretRef:
              name: godaddy-api-credentials
              key: api-secret
            production: true
